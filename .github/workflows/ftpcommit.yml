name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy via cURL
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      env:
        DB_HOST:        ${{ secrets.DB_HOST }}
        DB_USER:        ${{ secrets.DB_USER }}
        DB_PASS:        ${{ secrets.DB_PASS }}
        DB_NAME:        ${{ secrets.DB_NAME }}
        SITE_URL:       ${{ secrets.SITE_URL }}
        MQTT_HOST:      ${{ secrets.MQTT_HOST }}
        MQTT_PORT:      ${{ secrets.MQTT_PORT }}
        MQTT_USER:      ${{ secrets.MQTT_USER }}
        MQTT_PASS:      ${{ secrets.MQTT_PASS }}
        RASTER_API_KEY: ${{ secrets.RASTER_API_KEY }}
      run: |
        echo "🚀 Starting deployment..."
        curl -X POST \
          --data-urlencode "dbhost=$DB_HOST" \
          --data-urlencode "dbuser=$DB_USER" \
          --data-urlencode "dbpass=$DB_PASS" \
          --data-urlencode "dbname=$DB_NAME" \
          --data-urlencode "site_url=$SITE_URL" \
          --data-urlencode "mqtt_host=$MQTT_HOST" \
          --data-urlencode "mqtt_port=$MQTT_PORT" \
          --data-urlencode "mqtt_user=$MQTT_USER" \
          --data-urlencode "mqtt_pass=$MQTT_PASS" \
          --data-urlencode "raster_api_key=$RASTER_API_KEY" \
          https://soilqi.com/git.php \
          || echo "⚠️ cURL completed with warnings"
        echo "✅ Deploy triggered"
