name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy via cURL
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      run: |
        echo "🚀 Starting deployment..."
        curl -X POST \
          -d "dbhost=${{ secrets.DB_HOST }}" \
          -d "dbuser=${{ secrets.DB_USER }}" \
          -d "dbpass=${{ secrets.DB_PASS }}" \
          -d "dbname=${{ secrets.DB_NAME }}" \
          -d "site_url=${{ secrets.SITE_URL }}" \
          -d "mqtt_host=${{ secrets.MQTT_HOST }}" \
          -d "mqtt_port=${{ secrets.MQTT_PORT }}" \
          -d "mqtt_user=${{ secrets.MQTT_USER }}" \
          -d "mqtt_pass=${{ secrets.MQTT_PASS }}" \
          -d "raster_api_key=${{ secrets.RASTER_API_KEY }}" \
          https://soilqi.com/git.php \
          || echo "⚠️ cURL completed with warnings"
        echo "✅ Deploy triggered"
